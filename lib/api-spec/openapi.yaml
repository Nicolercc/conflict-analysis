openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: intelligence
    description: Conflict intelligence analysis
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /intelligence/analyze:
    post:
      operationId: analyzeArticle
      tags: [intelligence]
      summary: Analyze a conflict article
      description: Uses AI + live web data to extract structured intelligence from a conflict news article
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AnalyzeArticleBody"
      responses:
        "200":
          description: Structured intelligence brief
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IntelligenceBrief"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /intelligence/explore:
    post:
      operationId: exploreConflict
      tags: [intelligence]
      summary: Explore a conflict by topic
      description: Generate a comprehensive intelligence profile for any conflict, war, or geopolitical topic using live web data
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExploreConflictBody"
      responses:
        "200":
          description: Conflict exploration brief
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IntelligenceBrief"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    AnalyzeArticleBody:
      type: object
      properties:
        article:
          type: string
          description: The full text of the conflict news article to analyze
          minLength: 50
      required:
        - article
    ExploreConflictBody:
      type: object
      properties:
        topic:
          type: string
          description: The conflict, war, or geopolitical topic to explore (e.g. "Gaza conflict", "Sudan civil war", "Ukraine war")
          minLength: 3
      required:
        - topic
    Location:
      type: object
      properties:
        city:
          type: string
        country:
          type: string
        lat:
          type: number
        lng:
          type: number
      required:
        - city
        - country
        - lat
        - lng
    Credibility:
      type: object
      properties:
        score:
          type: number
          minimum: 0
          maximum: 100
        label:
          type: string
          enum: [Low, Medium, High]
        reason:
          type: string
      required:
        - score
        - label
        - reason
    RelatedEvent:
      type: object
      properties:
        date:
          type: string
        title:
          type: string
        description:
          type: string
        type:
          type: string
          enum: [strike, escalation, negotiation, humanitarian, political]
        lat:
          type: number
        lng:
          type: number
      required:
        - date
        - title
        - description
        - type
        - lat
        - lng
    CasualtyData:
      type: object
      properties:
        description:
          type: string
        civilianImpact:
          type: string
        allSides:
          type: string
      required:
        - description
        - civilianImpact
        - allSides
    RegionalPerspective:
      type: object
      properties:
        region:
          type: string
        viewpoint:
          type: string
      required:
        - region
        - viewpoint
    LiveEvent:
      type: object
      properties:
        title:
          type: string
        source:
          type: string
        url:
          type: string
        date:
          type: string
      required:
        - title
        - source
        - url
        - date
    IntelligenceBrief:
      type: object
      properties:
        headline:
          type: string
        location:
          $ref: "#/components/schemas/Location"
        summary:
          type: string
        actors:
          type: array
          items:
            type: string
        credibility:
          $ref: "#/components/schemas/Credibility"
        relatedEvents:
          type: array
          items:
            $ref: "#/components/schemas/RelatedEvent"
        escalationRisk:
          type: string
          enum: [Low, Medium, High]
        escalationReason:
          type: string
        casualtyData:
          $ref: "#/components/schemas/CasualtyData"
        perspectives:
          type: array
          items:
            $ref: "#/components/schemas/RegionalPerspective"
        liveEvents:
          type: array
          items:
            $ref: "#/components/schemas/LiveEvent"
        conflictBackground:
          type: string
        sources:
          type: array
          items:
            type: string
      required:
        - headline
        - location
        - summary
        - actors
        - credibility
        - relatedEvents
        - escalationRisk
        - escalationReason
        - casualtyData
        - perspectives
        - liveEvents
        - conflictBackground
        - sources
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
      required:
        - error
